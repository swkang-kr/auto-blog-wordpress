name: Daily Blog Post (Generate Only)

on:
  schedule:
    # 07:05 UTC = 16:05 KST — trade-engine data is ready by 16:00 KST
    # Phase A only: content generation (no WP API). publish-content.yml runs separately.
    - cron: '5 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Phase A — Generate content (no WP API calls)
        env:
          GENERATE_ONLY: 'true'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          SITE_NAME: ${{ secrets.SITE_NAME }}
          SITE_OWNER: ${{ secrets.SITE_OWNER }}
          SITE_TAGLINE: ${{ secrets.SITE_TAGLINE }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          AUTHOR_LINKEDIN: ${{ secrets.AUTHOR_LINKEDIN }}
          AUTHOR_TWITTER: ${{ secrets.AUTHOR_TWITTER }}
          AUTHOR_WEBSITE: ${{ secrets.AUTHOR_WEBSITE }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          NAVER_SITE_VERIFICATION: ${{ secrets.NAVER_SITE_VERIFICATION }}
          MIN_QUALITY_SCORE: ${{ secrets.MIN_QUALITY_SCORE }}
          POST_COUNT: '4'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          mkdir -p logs data/generated
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          node --import tsx/esm src/index.ts 2>&1 | tee logs/generate-${DATE}-${{ github.run_id }}.log

      - name: Commit generated JSON
        id: commit
        run: |
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/${DATE}.json
          if git diff --staged --quiet; then
            echo "No generated file to commit"
            echo "generated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat: generated content ${DATE} [skip ci]"
            git push
            echo "generated=true" >> $GITHUB_OUTPUT
            echo "date=${DATE}" >> $GITHUB_OUTPUT
          fi

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generate-log-${{ github.run_id }}
          path: logs/generate-*.log
          retention-days: 30

      - name: Trigger Phase B — publish-content
        if: steps.commit.outputs.generated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-content.yml \
            --repo swkang-kr/auto-blog-wordpress \
            --field date="${{ steps.commit.outputs.date }}"
