name: Daily Blog Post

on:
  schedule:
    - cron: '0 14 * * 1-5'  # UTC 14:00 Mon-Fri only (주말 제외, KST 23:00)
  workflow_dispatch:          # Manual trigger
    inputs:
      post_count:
        description: 'Number of niches to post (1-5: 시장/업종/테마/수급/추천주)'
        required: false
        default: '5'

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run auto blog posting
        run: node --import tsx/esm src/index.ts
        env:
          # Required
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          TRENDS_GEO: US
          LOG_LEVEL: info
          POST_COUNT: ${{ inputs.post_count || '5' }}

          # Site identity & E-E-A-T
          SITE_NAME: ${{ secrets.SITE_NAME }}
          SITE_OWNER: ${{ secrets.SITE_OWNER }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          AUTHOR_LINKEDIN: ${{ secrets.AUTHOR_LINKEDIN }}
          AUTHOR_TWITTER: ${{ secrets.AUTHOR_TWITTER }}

          # Claude model
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}

          # SEO verification
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          NAVER_SITE_VERIFICATION: ${{ secrets.NAVER_SITE_VERIFICATION }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

          # Google APIs (Indexing, GA4, GSC)
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}

          # Social syndication
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}

          # Pinterest
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}

          # Author website
          AUTHOR_WEBSITE: ${{ secrets.AUTHOR_WEBSITE }}

          # YouTube Data API (auto-embed relevant videos)
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

          # Lead Magnet (category-specific download CTA)
          # Telegram alerts
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # Monetization & growth
          NEWSLETTER_FORM_URL: ${{ secrets.NEWSLETTER_FORM_URL }}
          AFFILIATE_MAP: ${{ secrets.AFFILIATE_MAP }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # Niche focus (optional, comma-separated niche IDs)
          NICHE_FOCUS_IDS: ${{ secrets.NICHE_FOCUS_IDS }}

          # Korean content generation (hreflang Korean versions)
          ENABLE_KOREAN_CONTENT: ${{ secrets.ENABLE_KOREAN_CONTENT }}

          # Auto-rewrite settings
          AUTO_REWRITE_COUNT: ${{ secrets.AUTO_REWRITE_COUNT }}

          # AdSense RPM overrides (JSON: {"Korean Finance":14.5})
          ADSENSE_RPM_OVERRIDES: ${{ secrets.ADSENSE_RPM_OVERRIDES }}

          # Cloudflare CDN/Edge Caching
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}

          # Google API Key (CrUX + Rich Results)
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

          # Reddit OAuth API
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

          # Research model (cost optimization)
          CLAUDE_RESEARCH_MODEL: ${{ secrets.CLAUDE_RESEARCH_MODEL }}

          # Medium syndication
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}

          # Email automation webhook
          EMAIL_WEBHOOK_URL: ${{ secrets.EMAIL_WEBHOOK_URL }}

          # AdSense Management API
          ADSENSE_SA_KEY: ${{ secrets.ADSENSE_SA_KEY }}
          ADSENSE_ACCOUNT_ID: ${{ secrets.ADSENSE_ACCOUNT_ID }}

          # SerpAPI (Google Trends fallback)
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

          # Naver Blog auto-seeding
          NAVER_BLOG_ID: ${{ secrets.NAVER_BLOG_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

          # LinkedIn auto-posting
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}

          # Facebook Page auto-posting
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}

          # Threads auto-posting
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      - name: Commit post history and cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/post-history.json .cache/ || true
          git diff --staged --quiet || git commit -m "chore: update post history [skip ci]"
          git push
