name: Request Indexing

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  indexing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Inspect and request indexing for all posts
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GOOGLE_INDEXING_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: node --import tsx/esm src/scripts/inspect-and-request-indexing.ts
