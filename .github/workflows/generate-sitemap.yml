name: Generate Post Sitemap

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate post-sitemap.xml from published posts
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node --import tsx/esm src/scripts/generate-sitemap.ts
      - name: Upload post-sitemap.xml to WordPress root via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          sshpass -p "$SFTP_PASSWORD" sftp -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P 18765 \
            "${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }}" << EOF
          put post-sitemap.xml ${{ secrets.SFTP_REMOTE_PATH }}/post-sitemap.xml
          EOF
          echo "post-sitemap.xml 업로드 완료"
      - name: Commit sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add post-sitemap.xml
          git diff --staged --quiet || git commit -m "chore: regenerate post-sitemap.xml ($(date '+%Y-%m-%d')) [skip ci]"
          git push || true
