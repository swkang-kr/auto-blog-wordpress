name: Bulk Publish Draft Posts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bulk-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Bulk publish all draft posts
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: node --import tsx/esm src/scripts/bulk-publish-drafts.ts
